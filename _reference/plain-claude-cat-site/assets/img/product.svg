<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" role="img" aria-label="Movaro Cat Calm Wrap product">
  <defs>
    <linearGradient id="bgp" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#E7EDE0"/><stop offset="1" stop-color="#D6E0CB"/></linearGradient>
    <linearGradient id="wp" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#8A9B7C"/><stop offset="1" stop-color="#677A59"/></linearGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#bgp)"/>
  <ellipse cx="400" cy="820" rx="280" ry="60" fill="#000" opacity="0.06"/>
  <!-- folded wrap -->
  <rect x="220" y="360" width="360" height="300" rx="48" fill="url(#wp)"/>
  <rect x="220" y="360" width="360" height="80" rx="48" fill="#ffffff" opacity="0.08"/>
  <path d="M260 520 q140 50 280 0" stroke="#fff" stroke-opacity="0.18" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M260 580 q140 50 280 0" stroke="#fff" stroke-opacity="0.14" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- adjustable strap -->
  <rect x="300" y="330" width="200" height="40" rx="20" fill="#5E7052"/>
  <circle cx="350" cy="350" r="8" fill="#E7EDE0"/>
  <circle cx="450" cy="350" r="8" fill="#E7EDE0"/>
  <!-- embossed logo -->
  <text x="400" y="520" text-anchor="middle" font-family="Georgia, serif" font-size="46" fill="#ffffff" opacity="0.85">movaro</text>
</svg>
