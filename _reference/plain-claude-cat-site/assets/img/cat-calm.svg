<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="A relaxed cat resting securely in the Movaro wrap">
  <defs>
    <linearGradient id="cb" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F3E2D8"/><stop offset="1" stop-color="#E9D3C5"/></linearGradient>
    <linearGradient id="cw" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#C07A5E"/><stop offset="1" stop-color="#A8624A"/></linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#cb)"/>
  <ellipse cx="400" cy="640" rx="260" ry="56" fill="#000" opacity="0.05"/>
  <!-- wrap bundle -->
  <path d="M250 430 q150 -110 300 0 q60 150 20 250 q-170 80 -340 0 q-40 -100 20 -250 Z" fill="url(#cw)"/>
  <path d="M300 470 q100 50 200 0" stroke="#fff" stroke-opacity="0.16" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- sleeping cat head -->
  <ellipse cx="400" cy="370" rx="115" ry="100" fill="#C9B79B"/>
  <path d="M308 312 l-14 -76 l72 34 Z" fill="#C9B79B"/>
  <path d="M492 312 l14 -76 l-72 34 Z" fill="#C9B79B"/>
  <!-- closed content eyes -->
  <path d="M338 372 q18 16 36 0" stroke="#3D3730" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M426 372 q18 16 36 0" stroke="#3D3730" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M392 404 q8 8 16 0" fill="#C07A5E"/>
  <g stroke="#A89A86" stroke-width="2.5" stroke-linecap="round" opacity="0.7"><path d="M320 396 l-80 -12 M480 396 l80 -12"/></g>
  <!-- z's -->
  <g fill="#A8624A" opacity="0.6" font-family="Georgia, serif"><text x="540" y="250" font-size="44">z</text><text x="590" y="210" font-size="30">z</text></g>
</svg>
