<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" role="img" aria-label="Calm cat wrapped in a Movaro calming wrap while an owner gently trims a paw">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EFE8DB"/>
      <stop offset="1" stop-color="#E2D9C7"/>
    </linearGradient>
    <linearGradient id="wrap" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8A9B7C"/>
      <stop offset="1" stop-color="#6E8060"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="60%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <rect width="800" height="1000" fill="url(#glow)"/>
  <!-- soft floor pad -->
  <ellipse cx="400" cy="760" rx="320" ry="70" fill="#D8CDB8" opacity="0.7"/>
  <!-- blanket / wrap body -->
  <path d="M250 520 q150 -120 300 0 q70 130 30 250 q-180 90 -360 0 q-40 -120 30 -250 Z" fill="url(#wrap)"/>
  <path d="M250 520 q150 -120 300 0 q20 40 26 86 q-176 70 -352 0 q6 -46 26 -86 Z" fill="#ffffff" opacity="0.07"/>
  <!-- fold lines -->
  <path d="M300 560 q100 60 200 0" stroke="#ffffff" stroke-opacity="0.18" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M285 640 q115 70 230 0" stroke="#ffffff" stroke-opacity="0.14" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- cat head emerging -->
  <ellipse cx="400" cy="430" rx="120" ry="110" fill="#C9B79B"/>
  <!-- ears -->
  <path d="M305 360 l-18 -86 l80 36 Z" fill="#C9B79B"/>
  <path d="M495 360 l18 -86 l-80 36 Z" fill="#C9B79B"/>
  <path d="M312 350 l-8 -52 l46 24 Z" fill="#E8D2C0"/>
  <path d="M488 350 l8 -52 l-46 24 Z" fill="#E8D2C0"/>
  <!-- face -->
  <ellipse cx="356" cy="430" rx="13" ry="17" fill="#3D3730"/>
  <ellipse cx="444" cy="430" rx="13" ry="17" fill="#3D3730"/>
  <circle cx="360" cy="424" r="4" fill="#fff" opacity="0.8"/>
  <circle cx="448" cy="424" r="4" fill="#fff" opacity="0.8"/>
  <path d="M392 470 q8 10 16 0" fill="#C07A5E"/>
  <path d="M400 478 q0 16 -18 22 M400 478 q0 16 18 22" stroke="#7A6B58" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- whiskers -->
  <g stroke="#A89A86" stroke-width="2.5" stroke-linecap="round" opacity="0.7">
    <path d="M330 460 l-86 -16 M330 474 l-84 4 M470 460 l86 -16 M470 474 l84 4"/>
  </g>
  <!-- paw peeking through access opening -->
  <ellipse cx="520" cy="690" rx="46" ry="34" fill="#C9B79B"/>
  <circle cx="552" cy="682" r="9" fill="#C9B79B"/>
  <circle cx="566" cy="694" r="9" fill="#C9B79B"/>
  <circle cx="572" cy="710" r="9" fill="#C9B79B"/>
  <!-- owner hand with trimmer -->
  <path d="M640 700 q-60 -10 -100 6 q-18 8 -8 24 q14 16 40 8 q40 -12 70 -14 Z" fill="#E8C9A8"/>
  <rect x="600" y="688" width="70" height="14" rx="7" fill="#5C544A" transform="rotate(-14 635 695)"/>
  <rect x="648" y="676" width="30" height="10" rx="5" fill="#C07A5E" transform="rotate(-14 663 681)"/>
  <!-- calm sparkles -->
  <g fill="#ffffff" opacity="0.7">
    <circle cx="250" cy="300" r="4"/>
    <circle cx="560" cy="250" r="5"/>
    <circle cx="200" cy="560" r="3"/>
  </g>
</svg>
