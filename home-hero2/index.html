<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Movaro — Home Hero Slide 2 (Karate) mock</title>
<style>
:root{--sage:#246159}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,Segoe UI,Roboto,sans-serif;background:#efe7da;color:#1f2a28}
.note{max-width:760px;margin:18px auto 8px;padding:0 16px;font-size:13px;color:#6a6258;text-align:center}
.hero{position:relative;width:100%;overflow:hidden;background:#f5efe6}
.hero img.bg{width:100%;display:block}
.hero .desk{display:none}
.hero .scrim{position:absolute;inset:auto 0 0 0;height:62%;background:linear-gradient(to top,rgba(40,40,38,.46),rgba(40,40,38,.10) 55%,transparent)}
.hero .txt{position:absolute;left:0;bottom:0;padding:26px 22px 30px;max-width:560px}
.hero h1{font-family:Fraunces,Georgia,serif;color:#fff;font-weight:600;line-height:1.04;margin:0 0 10px;font-size:40px;text-shadow:0 2px 12px rgba(0,0,0,.28)}
.hero p{color:#fff;font-size:16px;line-height:1.45;margin:0 0 18px;text-shadow:0 1px 8px rgba(0,0,0,.32)}
.hero a.btn{display:inline-block;background:#fff;color:var(--sage);font-weight:600;font-size:15px;padding:13px 26px;border-radius:40px;text-decoration:none}
@media(min-width:760px){
  .hero .mob{display:none}.hero .desk{display:block}
  .hero .scrim{height:78%;width:52%;background:linear-gradient(to top,rgba(40,40,38,.40),rgba(40,40,38,.06) 60%,transparent)}
  .hero .txt{padding:48px 44px 52px;max-width:46%}
  .hero h1{font-size:58px}
  .hero p{font-size:18px;max-width:440px}
}
</style></head><body>
<div class="note">🧪 Lab preview — Home Hero, Slide 2 (Karate). Фото textless, текст накладывает тема (как слайд 1). Десктоп = коллаж E3+C7, моб = C7.</div>
<div class="hero">
  <img class="bg desk" src="karate-hero-desktop.jpg" alt="Karate Cat hero desktop">
  <img class="bg mob" src="karate-hero-mobile.jpg" alt="Karate Cat hero mobile">
  <div class="scrim"></div>
  <div class="txt">
    <h1>Born to wrestle.</h1>
    <p>The kick-and-wrestle buddy that brings out your cat&rsquo;s inner hunter &mdash; happy pounce-and-play, and scratch-free arms for you.</p>
    <a class="btn" href="#">Shop the Karate Cat &rarr;</a>
  </div>
</div>
</body></html>
